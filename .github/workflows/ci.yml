name: CI
on:
  - push
  - pull_request
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - 'lts'
          - '1'
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: julia-actions/setup-julia@4a12c5f801ca5ef0458bba44687563ef276522dd
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4
      - uses: julia-actions/julia-buildpkg@e3eb439fad4f9aba7da2667e7510e4a46ebc46e1
      - uses: julia-actions/julia-runtest@d60b785c6f2bdf4ebfb18b2b6f7d93b7dfb0efe3
        env:
          # bypass DataDeps donwload confirmation (needed for CI)
          DATADEPS_ALWAYS_ACCEPT: true
