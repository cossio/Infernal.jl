name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DATADEPS_ALWAYS_ACCEPT: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9
        with:
          version: "1.12"
          arch: x64
      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4
      - uses: julia-actions/julia-buildpkg@e3eb439fad4f9aba7da2667e7510e4a46ebc46e1
      - name: Smoke test package load
        run: julia --project=. -e 'import Infernal'
