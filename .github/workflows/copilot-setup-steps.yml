name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DATADEPS_ALWAYS_ACCEPT: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: julia-actions/setup-julia@5c9647d97b78a5debe5164e9eec09d653d29bd71
        with:
          version: "1.12"
          arch: x64
      - uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9
      - name: Instantiate workspace environment
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Instantiate test environment
        run: julia --project=test -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Smoke test package load
        run: julia --project=. -e 'import Infernal'
